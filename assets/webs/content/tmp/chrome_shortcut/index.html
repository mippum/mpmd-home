<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 바로가기 설치</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#03C75A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #03C75A;
      --green-dark: #02a84b;
      --green-light: #e6faf0;
      --gray: #f5f5f5;
      --text: #191919;
      --sub: #888;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--gray);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      max-width: 360px;
      width: 100%;
      padding: 40px 32px 36px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-wrap {
      width: 80px;
      height: 80px;
      background: var(--green);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 4px 20px rgba(3, 199, 90, 0.35);
    }

    .logo-wrap svg {
      width: 52px;
      height: 52px;
    }

    h1 {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .desc {
      font-size: 14px;
      color: var(--sub);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .steps {
      background: var(--green-light);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 28px;
      text-align: left;
    }

    .steps p {
      font-size: 13px;
      color: #333;
      line-height: 1.7;
    }

    .steps .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .steps .step:last-child {
      margin-bottom: 0;
    }

    .step-num {
      background: var(--green);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    #install-btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #install-btn:active {
      background: var(--green-dark);
      transform: scale(0.98);
    }

    #install-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      font-size: 13px;
      color: var(--sub);
      min-height: 20px;
    }

    #status.success {
      color: var(--green);
      font-weight: 700;
    }

    #status.error {
      color: #e53e3e;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 24px 0;
    }

    .open-link {
      font-size: 14px;
      color: var(--green);
      text-decoration: none;
      font-weight: 700;
    }

    /* 팝업 오버레이 */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .overlay.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .popup {
      background: #fff;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 28px 24px 40px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .popup-title {
      font-size: 17px;
      font-weight: 900;
      color: var(--text);
    }

    .popup-close {
      background: #f0f0f0;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .popup-step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }

    .popup-step:last-child {
      margin-bottom: 0;
    }

    .popup-step-num {
      background: var(--green);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .popup-step-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      padding-top: 3px;
    }

    .popup-step-text b {
      color: var(--green);
    }

    .popup-img {
      width: 100%;
      background: var(--green-light);
      border-radius: 12px;
      padding: 12px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--sub);
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-wrap">
      <!-- Naver N logo (SVG) -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.69 12.32L10.09 6H6v12h4.31V11.68L13.91 18H18V6h-4.31v6.32z" fill="white" />
      </svg>
    </div>

    <h1>네이버 바로가기 추가</h1>
    <p class="desc">버튼을 눌러 홈 화면에<br />네이버 바로가기를 추가하세요.</p>

    <div class="steps" id="manual-steps" style="display:none">
      <div class="step">
        <span class="step-num">1</span>
        <span>크롬 주소창 오른쪽 <b>⋮ 메뉴</b>를 탭하세요</span>
      </div>
      <div class="step">
        <span class="step-num">2</span>
        <span><b>홈 화면에 추가</b>를 선택하세요</span>
      </div>
      <div class="step">
        <span class="step-num">3</span>
        <span><b>추가</b>를 눌러 완료하세요</span>
      </div>
    </div>

    <button id="install-btn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 5v14M5 12l7 7 7-7" />
      </svg>
      홈 화면에 추가하기
    </button>

    <div id="status">설치 가능 여부 확인 중…</div>

    <hr class="divider" />
    <a class="open-link" href="https://www.naver.com">네이버 바로 열기 →</a>
  </div>

  <!-- 수동 안내 팝업 -->
  <div class="overlay" id="overlay">
    <div class="popup">
      <div class="popup-header">
        <span class="popup-title">홈 화면에 추가하는 방법</span>
        <button class="popup-close" id="popup-close">✕</button>
      </div>
      <div class="popup-step">
        <span class="popup-step-num">1</span>
        <div class="popup-step-text">크롬 주소창 오른쪽 <b>⋮ 메뉴</b>를 탭하세요</div>
      </div>
      <div class="popup-step">
        <span class="popup-step-num">2</span>
        <div class="popup-step-text"><b>홈 화면에 추가</b>를 선택하세요</div>
      </div>
      <div class="popup-step">
        <span class="popup-step-num">3</span>
        <div class="popup-step-text">이름을 확인하고 <b>추가</b>를 눌러 완료하세요</div>
      </div>
    </div>
  </div>

  <script>
    let deferredPrompt = null;
    const btn = document.getElementById('install-btn');
    const status = document.getElementById('status');
    const manualSteps = document.getElementById('manual-steps');

    // Service Worker 등록 (PWA 설치 조건)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      btn.disabled = false;
      status.textContent = '✓ 홈 화면 추가 준비 완료';
      status.className = 'success';
      manualSteps.style.display = 'none';
    });

    btn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        status.textContent = '✓ 홈 화면에 추가되었습니다!';
        status.className = 'success';
        btn.disabled = true;
        btn.textContent = '추가 완료 ✓';
      } else {
        status.textContent = '취소되었습니다.';
        status.className = '';
      }
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      status.textContent = '✓ 홈 화면에 추가되었습니다!';
      status.className = 'success';
      btn.disabled = true;
    });

    // 설치 불가능한 경우 (iOS 사파리, 이미 설치됨 등) 수동 안내
    setTimeout(() => {
      if (!deferredPrompt && btn.disabled) {
        // beforeinstallprompt 미발생 → 수동 안내 표시
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        if (isStandalone) {
          status.textContent = '이미 홈 화면에 추가되어 있습니다.';
          status.className = 'success';
        } else {
          status.textContent = '아래 방법으로 직접 추가해 주세요.';
          status.className = 'error';
          manualSteps.style.display = 'block';
          btn.textContent = '홈 화면에 추가하기 (수동)';
          btn.disabled = false;
          btn.onclick = () => {
            document.getElementById('overlay').classList.add('show');
          };
        }
      }
    }, 3000);
    document.getElementById('popup-close').addEventListener('click', () => {
      document.getElementById('overlay').classList.remove('show');
    });
    document.getElementById('overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
    });
  </script>
</body>

</html>
